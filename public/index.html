<!DOCTYPE html>
<html>
<head>
    <title>Sentry Bot Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; }
        .pay { background: #4CAF50; color: white; }
        .trade { background: #2196F3; color: white; }
        .afk { background: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>Sentry SMP Bot Control</h1>
    <button class="pay" onclick="fetch('/pay')">Send $1000 to Redresso2</button>
    <button class="trade" onclick="fetch('/trade')">Go to Spawn & Trade Keys</button>
    <button class="afk" onclick="fetch('/afk')">Back to AFK Zone</button>
    <p id="status">Status: Idle</p>

    <script>
        function doAction(route) {
            document.getElementById('status').innerText = "Status: Sending command...";
            fetch(route).then(res => res.text()).then(txt => {
                document.getElementById('status').innerText = "Status: " + txt;
            });
        }
    </script>
</body>
</html>
